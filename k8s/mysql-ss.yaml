apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-ss
spec:
  selector:
    matchLabels:
      app: mariadb
  serviceName: mariadb-service
  replicas: 1
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      securityContext:      # Container එකට එළියෙන් මේක දාන්න
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: mariadb
        image: mariadb:10.11
        # command:
        # - "mysqld"
        # - "--innodb-buffer-pool-size=512M"
        # - "--innodb-flush-log-at-trx-commit=2"
        # - "--skip-name-resolve"
        env:
          - name: MARIADB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                key: root-password
                name: mysql-pass
          - name: MARIADB_DATABASE
            value: wordpress
          - name: MARIADB_USER
            value: usr_pk
          - name: MARIADB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: db-password
                name: mysql-pass
          - name: MARIADB_EXTRA_FLAGS
            value: "--innodb-buffer-pool-size=512M --innodb-flush-log-at-trx-commit=2 --skip-name-resolve"
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: maria-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: maria-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: standard
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
spec:
  selector:
    app: mariadb
  ports:
  - port: 3306
  clusterIP: None

name: Build and Push WordPress Image

on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-pk-e:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-pk-e:v${{ github.run_number }}
      - name: Discord Success Notification
        if: success()
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK }}
          message: "🚀 **Build Success!** \nProject: ${{ github.repository }} \nVersion: v${{ github.run_number }} \nCommit: ${{ github.event.head_commit.message }}"

      - name: Discord Failure Notification
        if: failure()
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK }}
          message: "❌ **Build Failed!** \nSomething went wrong in ${{ github.repository }}. \nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions"
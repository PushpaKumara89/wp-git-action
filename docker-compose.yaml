services:
  redis:
    image: redis:alpine
    container_name: wp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - wordpress-net

  db:
    image: mariadb:10.11
    command: [
      "mysqld",
      "--innodb-buffer-pool-size=512M",
      "--innodb-flush-log-at-trx-commit=2",
      "--skip-name-resolve"
    ]
    # Note: MariaDB 10.11 is a Long Term Support (LTS) version
    volumes:
      - db_data:/var/lib/mysql
      - "${CONF_PATH}/db:/docker-entrypoint-initdb.d"
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: 1234root
      MARIADB_DATABASE: wordpress
      MARIADB_USER: usr_pk
      MARIADB_PASSWORD: 1234pk
    networks:
      - wordpress-net

  nginx:
    image: nginx:alpine
    ports:
      - "3030:80"
    volumes:
      - wordpress-vol:/var/www/html:ro
      - "${CONF_PATH}/nginx-config/nginx.conf:/etc/nginx/conf.d/default.conf"
    depends_on:
      - wordpress
    networks:
      - wordpress-net

  wordpress:
    build: .
    container_name: wp_docker
    image: wordpress-pk-e:1.0.0
    restart: unless-stopped
    volumes:
      - wordpress-vol:/var/www/html
      - "${CONF_PATH}/php-configs/php.ini:/usr/local/etc/php/conf.d/uploads.ini:ro"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: usr_pk
      WORDPRESS_DB_PASSWORD: 1234pk
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "false"
      WORDPRESS_CONFIG_EXTRA: |
        /* Performance & Security */
        define('WP_MEMORY_LIMIT', '1024M');
        define('WP_MAX_MEMORY_LIMIT', '2048M');
        define('DISALLOW_FILE_EDIT', true);
        
        /* Debugging off for speed */
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
        define('SAVEQUERIES', false);
        
        /* Redis Object Cache Config */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_DATABASE', 0);
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        
        /* External Request Management (Fixes the 5s lag) */
        define('WP_HTTP_BLOCK_EXTERNAL', false);
        define('WP_ACCESSIBLE_HOSTS', 'api.wordpress.org,*.elementor.com,connect.elementor.com');
    depends_on:
      - db
      - redis
    networks:
      - wordpress-net

volumes:
  db_data:
  wordpress-vol:
networks:
  wordpress-net:
    driver: bridge